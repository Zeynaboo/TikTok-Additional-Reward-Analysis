<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond Principal -->
  <rect width="1280" height="720" fill="#010101"/>
  
  <!-- Header (Titre et Slicers) -->
  <rect x="20" y="20" width="1240" height="80" rx="15" fill="#161616" stroke="#2B2B2B" stroke-width="1"/>
  <text x="50" y="65" fill="#FFFFFF" font-family="Segoe UI, sans-serif" font-size="28" font-weight="bold">TikTok Creator Rewards | Executive Summary</text>
  
  <!-- Zone KPI Gauche (3 Cartes) -->
  <rect x="20" y="120" width="280" height="130" rx="15" fill="#161616" stroke="#EE1D52" stroke-width="1"/>
  <rect x="20" y="270" width="280" height="130" rx="15" fill="#161616" stroke="#69C9D0" stroke-width="1"/>
  <rect x="20" y="420" width="280" height="130" rx="15" fill="#161616" stroke="#FFFFFF" stroke-width="0.5"/>

  <!-- Zone Graphique Principal (Évolution) -->
  <rect x="320" y="120" width="940" height="300" rx="15" fill="#161616" stroke="#2B2B2B" stroke-width="1"/>
  
  <!-- Zone Bas Gauche (Répartition) -->
  <rect x="320" y="440" width="460" height="260" rx="15" fill="#161616" stroke="#2B2B2B" stroke-width="1"/>
  
  <!-- Zone Bas Droite (Top Vidéos) -->
  <rect x="800" y="440" width="460" height="260" rx="15" fill="#161616" stroke="#2B2B2B" stroke-width="1"/>
</svg>